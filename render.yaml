services:
  - type: web
    name: finpro-bot
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: MODERATOR_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
